name: tms-prod

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: ../.env.prod
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      exec gunicorn cfg.wsgi:application --bind 0.0.0.0:8000 --workers 3 --access-logfile -"
    env_file: ../.env.prod
    expose:
      - "8000"
    volumes:
      - static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
          test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=5)"]
          interval: 5s
          timeout: 3s
          retries: 10

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=tasks.sreyash.tech
    volumes:
      - ../nginx/nginx.prod.conf:/etc/nginx/templates/default.conf.template:ro
      - static:/static:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy

  celery_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: celery -A cfg worker --loglevel=info
    env_file:
      - ../.env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  celery_beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: celery -A cfg beat --loglevel=info
    env_file:
      - ../.env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  static:
