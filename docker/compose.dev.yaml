name: tms-dev

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: ../.env.dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
      exec python manage.py runserver 0.0.0.0:8000"
    env_file: ../.env.dev
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    env_file: ../.env.dev
    volumes:
      - ../nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  celery_worker:
      build:
        context: ..
        dockerfile: docker/Dockerfile
      restart: unless-stopped
      command: celery -A cfg worker --loglevel=info
      volumes:
        - ..:/app
      env_file:
        - ../.env.dev
      depends_on:
        db:
          condition: service_healthy
        redis:
          condition: service_healthy

  celery_beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: celery -A cfg beat --loglevel=info
    volumes:
      - ..:/app
    env_file:
      - ../.env.dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
